<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3 Body Chaos</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      color: white;
      font-family: monospace;
    }
    button {
      padding: 6px 10px;
      margin-right: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="ui">
    <button onclick="reset()">reset</button>
    <button onclick="clearCanvas()">clear</button>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const G = 0.8;
    const dt = 0.6;
    const drag = 0.999;

    let bodies = [];
    let particles = [];

    function randomColor() {
      const hue = Math.floor(Math.random() * 360);
      return `hsl(${hue}, 100%, 60%)`;
    }

    function randomBody() {
      return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        prevX: 0,
        prevY: 0,
        vx: (Math.random() - 0.5) * 3,
        vy: (Math.random() - 0.5) * 3,
        m: Math.random() * 5 + 5,
        color: randomColor()
      };
    }

    function spawnFragments(x, y, baseColor) {
      for (let i = 0; i < 15; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4;

        particles.push({
          x,
          y,
          prevX: x,
          prevY: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 60 + Math.random() * 40,
          color: baseColor
        });
      }
    }

    function reset() {
      bodies = [randomBody(), randomBody(), randomBody()];
      particles = [];
      clearCanvas();
    }

    function clearCanvas() {
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function update() {
      for (let i = 0; i < bodies.length; i++) {
        let bi = bodies[i];

        for (let j = 0; j < bodies.length; j++) {
          if (i === j) continue;

          let bj = bodies[j];

          let dx = bj.x - bi.x;
          let dy = bj.y - bi.y;
          let distSq = dx * dx + dy * dy + 0.1;
          let dist = Math.sqrt(distSq);

          let force = G * bi.m * bj.m / distSq;

          let ax = force * dx / dist / bi.m;
          let ay = force * dy / dist / bi.m;

          bi.vx += ax * dt;
          bi.vy += ay * dt;
        }
      }

      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const pull = 0.0005;

      for (let b of bodies) {
        b.prevX = b.x;
        b.prevY = b.y;

        let dx = centerX - b.x;
        let dy = centerY - b.y;

        b.vx += dx * pull;
        b.vy += dy * pull;

        b.vx *= drag;
        b.vy *= drag;

        b.x += b.vx * dt;
        b.y += b.vy * dt;

        if (b.x < 0) b.x += canvas.width;
        if (b.x > canvas.width) b.x -= canvas.width;
        if (b.y < 0) b.y += canvas.height;
        if (b.y > canvas.height) b.y -= canvas.height;

        const maxSpeed = 10;
        b.vx = Math.max(Math.min(b.vx, maxSpeed), -maxSpeed);
        b.vy = Math.max(Math.min(b.vy, maxSpeed), -maxSpeed);
      }

      for (let i = 0; i < bodies.length; i++) {
        for (let j = i + 1; j < bodies.length; j++) {
          let bi = bodies[i];
          let bj = bodies[j];

          let dx = bj.x - bi.x;
          let dy = bj.y - bi.y;
          let dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 5) {
            spawnFragments(bi.x, bi.y, bi.color);
            spawnFragments(bj.x, bj.y, bj.color);

            bi.color = randomColor();
            bj.color = randomColor();
          }
        }
      }

      for (let p of particles) {
        p.prevX = p.x;
        p.prevY = p.y;

        p.x += p.vx;
        p.y += p.vy;

        p.vx *= 0.98;
        p.vy *= 0.98;

        p.life--;
      }

      particles = particles.filter(p => p.life > 0);
    }

    function draw() {
      // normal mode for fading background
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "rgba(10, 0, 20, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // switch to additive blending
      ctx.globalCompositeOperation = "lighter";

      // body trails
      for (let b of bodies) {
        ctx.beginPath();
        ctx.moveTo(b.prevX, b.prevY);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = b.color;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      // particles
      for (let p of particles) {
        ctx.beginPath();
        ctx.moveTo(p.prevX, p.prevY);
        ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 1;
        ctx.globalAlpha = p.life / 100;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }

      // restore default
      ctx.globalCompositeOperation = "source-over";
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    reset();
    loop();

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      clearCanvas();
    });
  </script>
</body>
</html>
