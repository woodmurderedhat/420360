<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3 Body Chaos</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      color: white;
      font-family: monospace;
    }
    button {
      padding: 6px 10px;
      margin-right: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="ui">
    <button onclick="reset()">reset</button>
    <button onclick="clearCanvas()">clear</button>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const G = 0.8;
    const dt = 0.6;
    const drag = 0.999;

    let bodies = [];

    function randomBody() {
      const hue = Math.floor(Math.random() * 360);

      return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 3,
        vy: (Math.random() - 0.5) * 3,
        m: Math.random() * 5 + 5,
        color: `hsl(${hue}, 100%, 60%)`
      };
    }

    function reset() {
      bodies = [randomBody(), randomBody(), randomBody()];
      clearCanvas();
    }

    function clearCanvas() {
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function update() {
      for (let i = 0; i < bodies.length; i++) {
        let bi = bodies[i];

        for (let j = 0; j < bodies.length; j++) {
          if (i === j) continue;

          let bj = bodies[j];

          let dx = bj.x - bi.x;
          let dy = bj.y - bi.y;
          let distSq = dx * dx + dy * dy + 0.1;
          let dist = Math.sqrt(distSq);

          let force = G * bi.m * bj.m / distSq;

          let ax = force * dx / dist / bi.m;
          let ay = force * dy / dist / bi.m;

          bi.vx += ax * dt;
          bi.vy += ay * dt;
        }
      }

      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const pull = 0.0005;

      for (let b of bodies) {
        // pull toward center
        let dx = centerX - b.x;
        let dy = centerY - b.y;

        b.vx += dx * pull;
        b.vy += dy * pull;

        // drag
        b.vx *= drag;
        b.vy *= drag;

        // move
        b.x += b.vx * dt;
        b.y += b.vy * dt;

        // wrap around screen
        if (b.x < 0) b.x += canvas.width;
        if (b.x > canvas.width) b.x -= canvas.width;
        if (b.y < 0) b.y += canvas.height;
        if (b.y > canvas.height) b.y -= canvas.height;

        // clamp velocity
        const maxSpeed = 10;
        b.vx = Math.max(Math.min(b.vx, maxSpeed), -maxSpeed);
        b.vy = Math.max(Math.min(b.vy, maxSpeed), -maxSpeed);
      }
    }

    function draw() {
      ctx.fillStyle = "rgba(0,0,0,0.01)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let b of bodies) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = b.color;
        ctx.fill();
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    reset();
    loop();

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      clearCanvas();
    });
  </script>
</body>
</html>
