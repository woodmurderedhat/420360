<body>
  <main class="reviews-app" aria-live="polite">
    <header class="hero">
      <p class="kicker">LETTERBOXD LOG</p>
      <h1>MOVIE REVIEWS</h1>
      <p class="subhead">Latest entries from woodmurderedhat</p>
      <div class="hero-actions">
        <a class="btn" href="https://letterboxd.com/woodmurderedhat/" target="_blank" rel="noopener noreferrer">Open Profile</a>
        <a class="btn btn-alt" href="https://letterboxd.com/woodmurderedhat/rss/" target="_blank" rel="noopener noreferrer">View RSS</a>
      </div>
      <p id="sync-meta" class="sync-meta">Sync status: loading</p>
    </header>

    <section id="status" class="status" role="status">Loading reviews...</section>
    <section id="reviews-grid" class="reviews-grid" aria-label="Movie reviews"></section>
  </main>

  <template id="review-card-template">
    <article class="review-card">
      <a class="poster-link" target="_blank" rel="noopener noreferrer">
        <img class="poster" loading="lazy" alt="" />
      </a>
      <div class="review-content">
        <p class="review-meta"><span class="date"></span><span class="rating"></span></p>
        <h2 class="title"></h2>
        <p class="excerpt"></p>
        <a class="read-link" target="_blank" rel="noopener noreferrer">Read on Letterboxd</a>
      </div>
    </article>
  </template>

  <script src="main.js" defer></script>
