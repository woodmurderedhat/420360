name: Sync Letterboxd Reviews

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 5'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and build reviews data
        run: node tools/fetch-letterboxd-reviews.mjs

      - name: Commit updates when changed
        run: |
          if git diff --quiet -- assets/data/movie-reviews.json; then
            echo "No feed changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/movie-reviews.json
          git commit -m "chore: sync Letterboxd reviews"
          git push
