<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="kicker">Realtime Experiment</p>
        <h1>Shared Pixel Board</h1>
        <p class="subtitle">A public surface that expects sabotage.</p>
      </div>
      <a class="back-link" href="../index.html">Back to Games</a>
    </header>

    <section class="control-panel" aria-label="Pixel controls">
      <label class="field">
        <span>Color</span>
        <input id="colorPicker" type="color" value="#ff4d4d" aria-label="Pick pixel color" />
      </label>

      <div class="field">
        <span>Current</span>
        <div id="currentColorSwatch" class="swatch" aria-live="polite">#FF4D4D</div>
      </div>

      <label class="field">
        <span>Cooldown</span>
        <div id="cooldownFixed" class="fixed-value" aria-label="Cooldown is locked">30s (locked)</div>
      </label>

      <label class="field checkbox-field">
        <input id="gridToggle" type="checkbox" checked />
        <span>Grid</span>
      </label>
    </section>

    <section class="status-row" aria-live="polite">
      <p id="connectionStatus" class="status-pill offline">offline</p>
      <p id="cooldownStatus" class="status-pill">ready</p>
      <p id="userCount" class="status-pill">users: 0</p>
      <p id="boardStamp" class="status-pill">last update: -</p>
      <p id="hoverStatus" class="status-pill">hover: -</p>
      <p id="sessionStats" class="status-pill">session: ok 0 | cd 0 | noop 0</p>
    </section>

    <section class="canvas-wrap" aria-label="Collaborative board">
      <canvas id="pixelCanvas" width="800" height="800" aria-label="100 by 100 shared pixel board"></canvas>
    </section>

    <section id="reconnectBanner" class="reconnect-banner" aria-live="polite">
      Connection lost. Reconnecting...
    </section>

    <section class="notice" id="noticeBox">
      Configure Firebase in app.js before deployment.
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
